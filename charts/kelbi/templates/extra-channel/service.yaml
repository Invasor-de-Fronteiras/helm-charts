---
{{- range $key, $ch := .Values.extraChannels }}
{{- if $ch.enabled }}
apiVersion: v1
kind: Service
metadata:
  namespace: {{ template "kelbi.namespace" $ }}
  name: {{ template "kelbi.fullname" $ }}-{{ $key }}
  labels:
    app: {{ template "kelbi.name" $ }}-{{ $key }}
spec:
  type: LoadBalancer
  ports:
    - port: {{ $ch.port }}
      targetPort: 80
      protocol: TCP
      name: channel
  selector:
    app: {{ template "kelbi.name" $ }}-{{ $key }}
---
{{- end }}
{{- end }}
