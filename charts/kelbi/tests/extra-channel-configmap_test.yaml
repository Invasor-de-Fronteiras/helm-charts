suite: extra-channel configmap
templates:
  - templates/extra-channel/configmap.yaml
tests:
  - it: should render no ConfigMap when extraChannels is empty
    release:
      name: release-name
      namespace: default
    set:
      extraChannels: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should render no ConfigMap when the channel is disabled
    release:
      name: release-name
      namespace: default
    set:
      extraChannels:
        foo:
          enabled: false
          image:
            repository: ghcr.io/zerulight/erupe
            tag: latest
          host: "1.2.3.4"
          port: 54010
          server: 7
          land: 1
          name: "Erupe Beta"
          maxPlayers: 100
          secretName: ""
          config: {}
    asserts:
      - hasDocuments:
          count: 0

  - it: should render one ConfigMap with correct fields when channel is enabled
    release:
      name: release-name
      namespace: default
    set:
      extraChannels:
        foo:
          enabled: true
          image:
            repository: ghcr.io/zerulight/erupe
            tag: latest
          host: "1.2.3.4"
          port: 54010
          server: 7
          land: 1
          name: "Erupe Beta"
          maxPlayers: 100
          secretName: ""
          config: {}
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
        documentIndex: 0
      - matchRegex:
          path: metadata.name
          pattern: foo
        documentIndex: 0
      - matchRegex:
          path: metadata.name
          pattern: config
        documentIndex: 0
      - equal:
          path: metadata.namespace
          value: default
        documentIndex: 0
      - isNotNull:
          path: data["config.json"]
        documentIndex: 0

  - it: should render two ConfigMaps when two channels are enabled
    release:
      name: release-name
      namespace: default
    set:
      extraChannels:
        bar:
          enabled: true
          image:
            repository: ghcr.io/zerulight/erupe
            tag: latest
          host: "1.2.3.4"
          port: 54011
          server: 8
          land: 2
          name: "Bar Channel"
          maxPlayers: 50
          secretName: ""
          config: {}
        foo:
          enabled: true
          image:
            repository: ghcr.io/zerulight/erupe
            tag: latest
          host: "1.2.3.4"
          port: 54010
          server: 7
          land: 1
          name: "Erupe Beta"
          maxPlayers: 100
          secretName: ""
          config: {}
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: ConfigMap
        documentIndex: 0
      - isKind:
          of: ConfigMap
        documentIndex: 1
      - matchRegex:
          path: metadata.name
          pattern: bar
        documentIndex: 0
      - matchRegex:
          path: metadata.name
          pattern: foo
        documentIndex: 1
