suite: extra-channel config.json entries
templates:
  - templates/config.yaml
tests:
  - it: config.json contains only default entries when extraChannels is empty
    release:
      name: release-name
    set:
      extraChannels: {}
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: '"Name":\s*"MezFes"'
      - notMatchRegex:
          path: data["config.json"]
          pattern: '"Name":\s*"Erupe Beta"'

  - it: config.json contains an extra entry after MezFes when one channel is enabled
    release:
      name: release-name
    set:
      extraChannels:
        foo:
          enabled: true
          image:
            repository: ghcr.io/zerulight/erupe
            tag: latest
          host: "1.2.3.4"
          port: 54010
          server: 7
          land: 1
          name: "Erupe Beta"
          maxPlayers: 100
          secretName: ""
          config: {}
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: '"Name":\s*"Erupe Beta"'
      - matchRegex:
          path: data["config.json"]
          pattern: '"IP":\s*"1\.2\.3\.4"'
      - matchRegex:
          path: data["config.json"]
          pattern: '"Type":\s*7'
      - matchRegex:
          path: data["config.json"]
          pattern: '"Port":\s*54010'
      - matchRegex:
          path: data["config.json"]
          pattern: '"MaxPlayers":\s*100'

  - it: config.json contains two extra entries when two channels are enabled
    release:
      name: release-name
    set:
      extraChannels:
        alpha:
          enabled: true
          image:
            repository: ghcr.io/zerulight/erupe
            tag: latest
          host: "1.2.3.4"
          port: 54010
          server: 7
          land: 1
          name: "Alpha Channel"
          maxPlayers: 100
          secretName: ""
          config: {}
        beta:
          enabled: true
          image:
            repository: ghcr.io/zerulight/erupe
            tag: v2
          host: "5.6.7.8"
          port: 54020
          server: 8
          land: 2
          name: "Beta Channel"
          maxPlayers: 50
          secretName: ""
          config: {}
    asserts:
      - matchRegex:
          path: data["config.json"]
          pattern: '"Name":\s*"Alpha Channel"'
      - matchRegex:
          path: data["config.json"]
          pattern: '"Name":\s*"Beta Channel"'
